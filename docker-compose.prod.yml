name: szeu-prod

services:
  traefik:
    image: traefik:v3.3
    mem_limit: 192m
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entryPoints.web.address=:80
      - --entryPoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.asDefault=true
      - --entrypoints.websecure.http.tls.certresolver=myresolver
      - --certificatesresolvers.myresolver.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory
      - --certificatesresolvers.myresolver.acme.email=postmaster@szentiras.eu
      - --certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - traefik
    restart: unless-stopped
  app:
    image: szeu-app-prod
    mem_limit: 1024m
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        - GIT_COMMIT_HASH=${GIT_COMMIT_HASH:-}
    # Use this when building: GIT_COMMIT_HASH=$(git rev-parse HEAD) docker compose ...
    env_file:
      - path: ./.env.prod # write your customizations here - these are used as environment variables, not from the file inside the container
        required: false
    volumes:
      - storage:/var/www/html/storage
      - sphinx_trigger:/opt/sphinx/trigger
    depends_on:
      database:
        condition: service_healthy
      sphinx:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      horizon:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=szeu-prod_traefik
      - traefik.http.routers.myapp.rule=Host(`${APP_DOMAIN}`) || Host(`www.${APP_DOMAIN}`)
      - traefik.http.services.myapp.loadbalancer.server.port=80
      - traefik.http.middlewares.mywwwredirect.redirectregex.regex=^https://www\.(.*)
      - traefik.http.middlewares.mywwwredirect.redirectregex.replacement=https://$${1}
      - traefik.http.routers.myapp.middlewares=mywwwredirect,hsts,compress
      - traefik.http.routers.myapp.priority=10
      - traefik.http.middlewares.compress.compress=true
      - traefik.http.middlewares.hsts.headers.stsSeconds=31536000
      - traefik.http.middlewares.hsts.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.hsts.headers.stsPreload=true
      
    networks:
      - traefik
      - internal
    restart: unless-stopped
  sphinx:
    image: macbre/sphinxsearch:3.7.1
    volumes:
      - ./deploy/production/sphinx/sphinx.conf.in:/etc/sphinxsearch/sphinx.conf.in
      - ./docker/sphinx/start.sh:/opt/sphinx/start.sh
      - ./docker/sphinx/reindex.sh:/opt/sphinx/reindex.sh
      - sphinx_data:/opt/sphinx/indexes
      - sphinx_trigger:/opt/sphinx/trigger
    mem_limit: 128m
    env_file:
      - ./.env.prod
    depends_on:
      database:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "searchd --config /etc/sphinxsearch/sphinx.conf --status"]
      start_period: 1m
      interval: 10s
      timeout: 5s
      retries: 3      
    command: sh -c "/opt/sphinx/start.sh"
    restart: unless-stopped
  database:
    image: pgvector/pgvector:pg17
    mem_limit: 1024m
    env_file:
      - ./.env.prod # for the database credentials
    networks:
      - internal
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/database:/docker-entrypoint-initdb.d
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
      start_period: 1m
      interval: 10s
      timeout: 5s
      retries: 3      
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly no --maxmemory 92mb --maxmemory-policy allkeys-lru
    mem_limit: 96m    
    env_file:
      - path: ./.env.prod
        required: false
    networks:
      - internal
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
  migrator:
    image: szeu-app-prod
    user: "33:33" # www-data
    mem_limit: 256m
    env_file:
      - path: ./.env.prod
        required: false
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      database:
        condition: service_healthy
    networks:
      - internal
    entrypoint: []
    command: php artisan migrate -n --force
    restart: "no"
  horizon:
    image: szeu-app-prod
    user: "33:33" # www-data
    mem_limit: 512m
    init: true    
    env_file:
      - path: ./.env.prod
        required: false
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - internal
    command: php artisan horizon
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status | grep -q running"]
      start_period: 30s
      interval: 15s
      timeout: 10s
      retries: 3
  memcached:
    image: memcached:1.6
    command: ["memcached", "-m", "192", "-I", "2m"]
    networks:
      - internal
    mem_limit: 192m
    restart: unless-stopped
  maintenance:
    image: nginx:alpine
    mem_limit: 32m
    volumes:
      - ./docker/maintenance:/usr/share/nginx/html:ro
      - ./docker/maintenance/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.maintenance.rule=Host(`${APP_DOMAIN}`) || Host(`www.${APP_DOMAIN}`)
      - traefik.http.routers.maintenance.priority=1
      - traefik.http.services.maintenance.loadbalancer.server.port=80
    restart: unless-stopped
volumes:
  db-data:
  storage:
  letsencrypt:
  sphinx_data:
  sphinx_trigger:
  redis-data:
networks:
  traefik:
  internal:
