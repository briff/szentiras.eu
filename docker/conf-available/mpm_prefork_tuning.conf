<IfModule mpm_prefork_module>
    # Keep startup light
    StartServers             2
    MinSpareServers          2
    MaxSpareServers          4

    # Hard cap: prefork == 1 process per concurrent request
    ServerLimit             12
    MaxRequestWorkers       12

    # Recycle workers to avoid gradual bloat/leaks
    MaxConnectionsPerChild  500
</IfModule>