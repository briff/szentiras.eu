# -----------------------------
# Core memory tuning (1.2 GB container cap)
# -----------------------------
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 8MB
maintenance_work_mem = 128MB

# Keep connections under control (prefer pooling if you can)
max_connections = 50

# Optional: reasonable per-session overhead
# temp_buffers = 8MB

# -----------------------------
# WAL / checkpoints (reduce IO spikes)
# -----------------------------
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 256MB

# -----------------------------
# Planner / statistics
# -----------------------------
default_statistics_target = 100

# -----------------------------
# Autovacuum (avoid bloat, keep it gentle)
# -----------------------------
autovacuum_max_workers = 2
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# -----------------------------
# Logging (minimal but useful)
# -----------------------------
log_line_prefix = '%m [%p] %u@%d '
log_min_duration_statement = 500ms
log_checkpoints = on
log_autovacuum_min_duration = 1s

# -----------------------------
# Safety/timeouts (optional but recommended)
# -----------------------------
statement_timeout = 120s
idle_in_transaction_session_timeout = 60s
lock_timeout = 5s

# -----------------------------
# Locale / time (optional)
# -----------------------------
timezone = 'UTC'